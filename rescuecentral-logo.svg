<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" role="img" aria-label="RescueCentral">
  <defs>
    <linearGradient id="rc-paw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B3050"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
  </defs>
  <!-- Paw print icon -->
  <g transform="translate(10,12)">
    <ellipse cx="30" cy="40" rx="16" ry="13" fill="url(#rc-paw)"/>
    <ellipse cx="14" cy="22" rx="6" ry="8" fill="url(#rc-paw)"/>
    <ellipse cx="30" cy="14" rx="6.5" ry="8.5" fill="url(#rc-paw)"/>
    <ellipse cx="46" cy="22" rx="6" ry="8" fill="url(#rc-paw)"/>
    <ellipse cx="56" cy="36" rx="5" ry="7" fill="url(#rc-paw)"/>
    <!-- Heart on paw pad -->
    <path d="M30 36 C26 32, 22 34, 24 39 L30 46 L36 39 C38 34, 34 32, 30 36 Z" fill="#DAA520"/>
  </g>
  <!-- Wordmark -->
  <text x="80" y="52" font-family="'DM Serif Display', Georgia, serif" font-size="34" fill="#0D1B2A" letter-spacing="-0.5">Rescue<tspan fill="#4FB3A9">Central</tspan></text>
</svg>
